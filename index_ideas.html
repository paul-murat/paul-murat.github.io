<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Joyeux Anniversaire Jade</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
background:#000;
color:white;
overflow-x:hidden;
}

.scroll-section{
height:1200vh;
position:relative;
}

.sticky{
position:sticky;
top:0;
height:100vh;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
}

.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:100%;
text-align:center;
}

.title{
position:absolute;
width:100%;
font-size:clamp(40px,7vw,110px);
font-weight:600;
letter-spacing:-0.03em;
opacity:0;
transform:translate3d(0,80px,0);
will-change:transform,opacity;
}

.big-number{
position:absolute;
width:100%;
font-size:clamp(120px,20vw,400px);
font-weight:700;
opacity:0;
}

.photo{
position:absolute;
width:260px;
height:360px;
border-radius:20px;
overflow:hidden;
opacity:0;
transform:scale(.8);
box-shadow:0 30px 80px rgba(0,0,0,.8);
}

.photo img{
width:100%;
height:100%;
object-fit:cover;
}

.gift{
position:absolute;
width:320px;
height:420px;
border-radius:30px;
background:linear-gradient(180deg,#111,#000);
border:1px solid rgba(255,255,255,.1);
opacity:0;
transform:scale(.6);
box-shadow:0 40px 120px rgba(0,0,0,.9);
}

.final-text{
position:absolute;
width:100%;
font-size:clamp(40px,6vw,90px);
opacity:0;
}

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

.music-btn{
position:fixed;
top:20px;
right:20px;
background:white;
color:black;
padding:10px 16px;
border-radius:20px;
font-weight:600;
cursor:pointer;
z-index:10;
}

</style>
</head>
<body>



<canvas id="confetti"></canvas>

<section class="scroll-section" id="section">
<div class="sticky">

<div class="center">

<div class="title" id="t1">Joyeux anniversaire</div>
<div class="title" id="t2">Jade</div>
<div class="big-number" id="num">26</div>
<div class="title" id="t3">26 ans de souvenirs</div>
<div class="title" id="t4">26 ans de bonheur</div>
<div class="title" id="t5">Une journĂ©e pour toi</div>
<div class="title" id="t6">Quelques moments ensemble</div>
<div class="title" id="t7">Et une surprise...</div>

<div class="final-text" id="final">Joyeux anniversaire Jade âť¤ď¸Ź</div>

</div>

<div class="photo" id="p1"></div>
<div class="photo" id="p2"></div>
<div class="photo" id="p3"></div>
<div class="photo" id="p4"></div>
<div class="photo" id="p5"></div>
<div class="photo" id="p6"></div>

<div class="gift" id="gift"></div>

</div>
</section>

<script>
const section=document.getElementById("section")

const texts=[t1,t2,t3,t4,t5,t6,t7]

let target=0,current=0

window.addEventListener("scroll",()=>{
const rect=section.getBoundingClientRect()
const vh=window.innerHeight
if(rect.top<=0&&rect.bottom>=vh){
const progress=Math.abs(rect.top)/(rect.height-vh)
target=Math.min(Math.max(progress,0),1)
}
})

function show(el,p,start,end){
let local=(p-start)/(end-start)
local=Math.max(0,Math.min(local,1))

const fade= Math.sin(local*Math.PI)

el.style.opacity=fade
el.style.transform=`translate3d(0,${80-(fade*80)}px,0)`
}

function animate(){
current+=(target-current)*0.06
const p=current

const step=1/(texts.length+3)

texts.forEach((el,i)=>{
show(el,p,i*step,(i+1)*step)
})

/* number 26 */
show(num,p,step*1.5,step*2.5)
num.style.transform=`scale(${0.5+num.style.opacity*0.8})`

/* photos */
const phStart=step*5
const ph=(p-phStart)*2

if(ph>0){
const v=Math.min(ph,1)

p1.style.opacity=v
p1.style.transform=`translate3d(${-600+v*700}px,-200px,0)`

p2.style.opacity=v
p2.style.transform=`translate3d(${600-v*700}px,200px,0)`

p3.style.opacity=v
p3.style.transform=`translate3d(${-200+v*300}px,300px,0)`

p4.style.opacity=v
p4.style.transform=`translate3d(${200-v*300}px,-300px,0)`

p5.style.opacity=v
p5.style.transform=`translate3d(${-100+v*200}px,-350px,0)`

p6.style.opacity=v
p6.style.transform=`translate3d(${100-v*200}px,350px,0)`
}

/* gift */
const gStart=.8
const g=(p-gStart)*4

if(g>0){
const v=Math.min(g,1)

gift.style.opacity=v
gift.style.transform=`scale(${0.6+v*.4})`
}

/* final */
show(final,p,.92,1)

requestAnimationFrame(animate)
}

animate()

/* confetti */
const canvas=document.getElementById("confetti")
const ctx=canvas.getContext("2d")
canvas.width=window.innerWidth
canvas.height=window.innerHeight

const confetti=Array.from({length:120},()=>({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*6,
d:Math.random()*360
}))

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height)
confetti.forEach(c=>{
ctx.beginPath()
ctx.arc(c.x,c.y,c.r,0,Math.PI*2)
ctx.fillStyle=`hsl(${c.d},100%,50%)`
ctx.fill()

c.y+=1
if(c.y>canvas.height)c.y=0
})
requestAnimationFrame(draw)
}

draw()

</script>

</body>
</html>
