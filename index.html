<!doctype html>
<html lang="fr">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Joyeux anniversaire</title>
	<link rel="stylesheet" href="style.css" />
	<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>

<body>
	<section class="scroll-section" id="section">
		<div class="sticky">
			<div class="gradient" id="gradient"></div>

			<div class="blob blob1" id="b1"></div>
			<div class="blob blob2" id="b2"></div>
			<div class="blob blob3" id="b3"></div>
			<div class="blob blob4" id="b4"></div>

			<canvas id="confetti-canvas"></canvas>

			<div class="title" id="t1">Joyeux anniversaire Jadou ! 🍾</div>

			<div class="subtitle" id="sub">Petit retour sur ta 25<sup>e</sup> année</div>

			<div class="final-text" id="final">Ton cadeau</div>

			<div class="help-text" id="help">On le choisira ensemble</div>

			<div class="bag-emoji" id="bag">👜</div>

			<div class="bag-subtitle" id="bagSubtitle">Lancaster, Songmont ou Hermes (non stp) a toi de me dire 🫶🏼</div>

			<!-- Conteneur pour le défilement d'images (carousel) -->
			<div class="slideshow-container">
				<div class="images-grid" id="imagesGrid">
					<!-- Les images seront générées par JavaScript -->
				</div>
			</div>
		</div>
	</section>

	<script src="script.js"></script>
</body>

</html>
