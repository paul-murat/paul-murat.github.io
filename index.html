<!doctype html>
<html lang="fr">
  <head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Apple Scroll V3</title>

	<style>
	  * {
		margin: 0;
		padding: 0;
		box-sizing: border-box;
	  }

	  body {
		font-family:
		  -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
		background: #000;
		color: white;
		overflow-x: hidden;
	  }

	  .scroll-section {
		height: 600vh;
		position: relative;
	  }

	  .sticky {
		position: sticky;
		top: 0;
		height: 100vh;
		overflow: hidden;
		display: flex;
		align-items: center;
		justify-content: center;
	  }

	  .title {
		position: absolute;
		font-size: clamp(42px, 7vw, 110px);
		font-weight: 600;
		letter-spacing: -0.03em;
		text-align: center;
		opacity: 0;
		transform: translate3d(0, 120px, 0) scale(0.9);
		will-change: transform, opacity;
	  }

	  .subtitle {
		position: absolute;
		margin-top: 140px;
		font-size: 22px;
		color: #aaa;
		opacity: 0;
		transform: translate3d(0, 60px, 0);
		will-change: transform, opacity;
	  }

	  /* BACKGROUND BLOBS */
	  .blob {
		position: absolute;
		border-radius: 50%;
		filter: blur(40px);
		opacity: 0;
		will-change: transform, opacity;
	  }

	  .blob1 {
		width: 600px;
		height: 600px;
		background: #0071e3;
	  }

	  .blob2 {
		width: 500px;
		height: 500px;
		background: #ff2d55;
	  }

	  .blob3 {
		width: 400px;
		height: 400px;
		background: #34c759;
	  }

	  .blob4 {
		width: 300px;
		height: 300px;
		background: #af52de;
	  }

	  /* LIGHT GRADIENT */
	  .gradient {
		position: absolute;
		width: 1400px;
		height: 1400px;
		border-radius: 50%;
		background: radial-gradient(
		  circle,
		  rgba(0, 120, 255, 0.25),
		  transparent 60%
		);
		opacity: 0;
		will-change: transform, opacity;
	  }
	</style>
  </head>
  <body>
	<section class="scroll-section" id="section">
	  <div class="sticky">
		<div class="gradient" id="gradient"></div>

		<div class="blob blob1" id="b1"></div>
		<div class="blob blob2" id="b2"></div>
		<div class="blob blob3" id="b3"></div>
		<div class="blob blob4" id="b4"></div>

		<div class="title" id="t1">Une nouvelle façon</div>
		<div class="title" id="t2">de naviguer</div>
		<div class="title" id="t3">Tout réagit au scroll</div>
		<div class="title" id="t4">Fluide. Naturel. Moderne.</div>

		<div class="subtitle" id="sub">Inspiré des animations Apple</div>
	  </div>
	</section>

	<script>
	  const section = document.getElementById("section");

	  const t1 = document.getElementById("t1");
	  const t2 = document.getElementById("t2");
	  const t3 = document.getElementById("t3");
	  const t4 = document.getElementById("t4");

	  const sub = document.getElementById("sub");

	  const b1 = document.getElementById("b1");
	  const b2 = document.getElementById("b2");
	  const b3 = document.getElementById("b3");
	  const b4 = document.getElementById("b4");

	  const gradient = document.getElementById("gradient");

	  let target = 0;
	  let current = 0;

	  window.addEventListener("scroll", () => {
		const rect = section.getBoundingClientRect();
		const vh = window.innerHeight;

		if (rect.top <= 0 && rect.bottom >= vh) {
		  const progress = Math.abs(rect.top) / (rect.height - vh);
		  target = Math.min(Math.max(progress, 0), 1);
		}
	  });

	  function animate() {
		current += (target - current) * 0.06;
		const p = current;

		const p1 = Math.min(p * 4, 1);
		const p2 = Math.min(Math.max((p - 0.25) * 4, 0), 1);
		const p3 = Math.min(Math.max((p - 0.5) * 4, 0), 1);
		const p4 = Math.min(Math.max((p - 0.75) * 4, 0), 1);

		/* TEXT */

		t1.style.opacity = 1 - p2;
		t1.style.transform = `translate3d(0,${120 - p1 * 120}px,0) scale(${0.9 + p1 * 0.1})`;

		t2.style.opacity = p2 - p3;
		t2.style.transform = `translate3d(0,${120 - p2 * 120}px,0) scale(${0.9 + p2 * 0.1})`;

		t3.style.opacity = p3 - p4;
		t3.style.transform = `translate3d(0,${120 - p3 * 120}px,0) scale(${0.9 + p3 * 0.1})`;

		t4.style.opacity = p4;
		t4.style.transform = `translate3d(0,${120 - p4 * 120}px,0) scale(${0.9 + p4 * 0.1})`;

		sub.style.opacity = p4;
		sub.style.transform = `translate3d(0,${60 - p4 * 60}px,0)`;

		/* GRADIENT */

		gradient.style.opacity = p;
		gradient.style.transform = `scale(${0.8 + p * 0.6})`;

		/* BLOBS PARALLAX */

		b1.style.opacity = p;
		b1.style.transform = `translate3d(${-500 + p * 900}px,${200 - p * 400}px,0)`;

		b2.style.opacity = p;
		b2.style.transform = `translate3d(${400 - p * 800}px,${-300 + p * 600}px,0)`;

		b3.style.opacity = p;
		b3.style.transform = `translate3d(${-300 + p * 500}px,${400 - p * 800}px,0)`;

		b4.style.opacity = p;
		b4.style.transform = `translate3d(${300 - p * 600}px,${300 - p * 500}px,0)`;

		requestAnimationFrame(animate);
	  }

	  animate();
	</script>
  </body>
</html>
