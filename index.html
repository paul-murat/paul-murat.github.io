<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Apple Style Scroll Animation</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
background:black;
color:white;
overflow-x:hidden;
}

/* SECTION SCROLL */
.scroll-section{
height:500vh;
position:relative;
}

.sticky{
position:sticky;
top:0;
height:100vh;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
}

/* TITRES */
.title{
position:absolute;
font-size:clamp(40px,6vw,90px);
font-weight:600;
letter-spacing:-0.02em;
text-align:center;
opacity:0;
transform:translateY(100px);
}

.subtitle{
position:absolute;
margin-top:120px;
font-size:22px;
color:#aaa;
opacity:0;
transform:translateY(60px);
}

/* SHAPES */
.shape{
position:absolute;
border-radius:30px;
filter:blur(0px);
opacity:0;
}

.shape1{
width:400px;
height:400px;
background:linear-gradient(135deg,#0ea5e9,#6366f1);
}

.shape2{
width:300px;
height:300px;
background:linear-gradient(135deg,#ff3b30,#ff9500);
}

.shape3{
width:200px;
height:200px;
background:linear-gradient(135deg,#34c759,#00c7be);
}

/* CENTER OBJECT */
.device{
position:absolute;
width:260px;
height:520px;
border-radius:40px;
background:linear-gradient(180deg,#111,#000);
border:1px solid rgba(255,255,255,0.1);
box-shadow:
0 0 0 1px rgba(255,255,255,0.05),
0 40px 120px rgba(0,0,0,0.8);
opacity:0;
transform:scale(.6);
}

.glow{
position:absolute;
width:600px;
height:600px;
border-radius:50%;
background:radial-gradient(circle,rgba(0,140,255,.4),transparent);
filter:blur(40px);
opacity:0;
}

</style>
</head>
<body>

<section class="scroll-section" id="section">
<div class="sticky">

<div class="glow" id="glow"></div>

<div class="title" id="title1">Une expérience</div>
<div class="title" id="title2">Pensée pour le scroll</div>
<div class="title" id="title3">Fluide. Moderne. Apple-style.</div>

<div class="subtitle" id="sub">Tout est animé par votre mouvement</div>

<div class="shape shape1" id="shape1"></div>
<div class="shape shape2" id="shape2"></div>
<div class="shape shape3" id="shape3"></div>

<div class="device" id="device"></div>

</div>
</section>

<script>
const section = document.getElementById("section")

const title1 = document.getElementById("title1")
const title2 = document.getElementById("title2")
const title3 = document.getElementById("title3")

const sub = document.getElementById("sub")

const shape1 = document.getElementById("shape1")
const shape2 = document.getElementById("shape2")
const shape3 = document.getElementById("shape3")

const device = document.getElementById("device")
const glow = document.getElementById("glow")

window.addEventListener("scroll", () => {

const rect = section.getBoundingClientRect()
const vh = window.innerHeight

let progress = 0

if(rect.top <= 0 && rect.bottom >= vh){
progress = Math.abs(rect.top) / (rect.height - vh)
}

progress = Math.min(Math.max(progress,0),1)

/* PHASES */
const p1 = Math.min(progress*3,1)
const p2 = Math.min(Math.max((progress-.33)*3,0),1)
const p3 = Math.min(Math.max((progress-.66)*3,0),1)

/* TITLE 1 */
title1.style.opacity = 1-p2
title1.style.transform = `translateY(${100 - p1*100}px)`

/* TITLE 2 */
title2.style.opacity = p2 - p3
title2.style.transform = `translateY(${100 - p2*100}px)`

/* TITLE 3 */
title3.style.opacity = p3
title3.style.transform = `translateY(${100 - p3*100}px)`

/* SUB */
sub.style.opacity = p3
sub.style.transform = `translateY(${60 - p3*60}px)`

/* DEVICE */
device.style.opacity = p2

device.style.transform = `
scale(${0.6 + p2*0.5})
rotate(${p2*10}deg)
`

/* GLOW */
glow.style.opacity = p2
glow.style.transform = `scale(${0.8 + p2})`

/* SHAPES PARALLAX */
shape1.style.opacity = p2
shape1.style.transform = `
translate(
${-300 + progress*600}px,
${200 - progress*400}px
)
rotate(${progress*180}deg)
`

shape2.style.opacity = p2
shape2.style.transform = `
translate(
${400 - progress*700}px,
${-200 + progress*500}px
)
rotate(${progress*-140}deg)
`

shape3.style.opacity = p3
shape3.style.transform = `
translate(
${-200 + progress*300}px,
${300 - progress*600}px
)
rotate(${progress*220}deg)
`

})
</script>

</body>
</html>
