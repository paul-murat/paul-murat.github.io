<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Joyeux Anniversaire Jade</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
background:#000;
color:white;
overflow-x:hidden;
}

.scroll-section{
height:900vh;
position:relative;
}

.sticky{
position:sticky;
top:0;
height:100vh;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
}

.title{
position:absolute;
font-size:clamp(40px,7vw,110px);
font-weight:600;
text-align:center;
letter-spacing:-0.03em;
opacity:0;
transform:translate3d(0,120px,0) scale(.9);
will-change:transform,opacity;
}

.subtitle{
position:absolute;
margin-top:140px;
font-size:24px;
color:#ccc;
opacity:0;
transform:translate3d(0,60px,0);
will-change:transform,opacity;
}

/* PHOTOS */
.photo{
position:absolute;
width:280px;
height:380px;
background:#111;
border-radius:20px;
overflow:hidden;
opacity:0;
transform:scale(.8);
box-shadow:0 30px 80px rgba(0,0,0,.8);
will-change:transform,opacity;
}

.photo img{
width:100%;
height:100%;
object-fit:cover;
}

/* confetti blobs */
.blob{
position:absolute;
border-radius:50%;
filter:blur(40px);
opacity:0;
will-change:transform,opacity;
}

.b1{width:600px;height:600px;background:#ff2d55}
.b2{width:500px;height:500px;background:#007aff}
.b3{width:400px;height:400px;background:#34c759}
.b4{width:350px;height:350px;background:#af52de}

/* gift */
.gift{
position:absolute;
width:320px;
height:420px;
border-radius:30px;
background:linear-gradient(180deg,#111,#000);
border:1px solid rgba(255,255,255,.1);
opacity:0;
transform:scale(.6) rotate(-10deg);
will-change:transform,opacity;
box-shadow:0 40px 120px rgba(0,0,0,.9);
}

.gift-text{
position:absolute;
margin-top:380px;
font-size:28px;
opacity:0;
color:#ddd;
}

</style>
</head>
<body>

<section class="scroll-section" id="section">
<div class="sticky">

<div class="blob b1" id="b1"></div>
<div class="blob b2" id="b2"></div>
<div class="blob b3" id="b3"></div>
<div class="blob b4" id="b4"></div>

<div class="title" id="t1">Joyeux anniversaire</div>
<div class="title" id="t2">Jade</div>
<div class="title" id="t3">26 ans aujourd'hui</div>
<div class="title" id="t4">Une journée spéciale</div>
<div class="title" id="t5">Pour quelqu'un d'exceptionnel</div>
<div class="title" id="t6">Quelques souvenirs...</div>
<div class="title" id="t7">Et une surprise à la fin</div>

<div class="subtitle" id="sub">Scroll pour continuer</div>

<!-- PHOTOS placeholders -->
<div class="photo" id="p1"></div>
<div class="photo" id="p2"></div>
<div class="photo" id="p3"></div>
<div class="photo" id="p4"></div>

<div class="gift" id="gift"></div>
<div class="gift-text" id="giftText">Ton cadeau t'attend…</div>

</div>
</section>

<script>
const section = document.getElementById("section")

const titles = [
 t1,t2,t3,t4,t5,t6,t7
]

const sub = document.getElementById("sub")

const p1 = document.getElementById("p1")
const p2 = document.getElementById("p2")
const p3 = document.getElementById("p3")
const p4 = document.getElementById("p4")

const gift = document.getElementById("gift")
const giftText = document.getElementById("giftText")

const blobs = [b1,b2,b3,b4]

let target = 0
let current = 0

window.addEventListener("scroll", () => {
const rect = section.getBoundingClientRect()
const vh = window.innerHeight

if(rect.top <= 0 && rect.bottom >= vh){
const progress = Math.abs(rect.top) / (rect.height - vh)
target = Math.min(Math.max(progress,0),1)
}
})

function animate(){

current += (target-current)*0.05
const p = current

/* timeline */
const steps = titles.length

for(let i=0;i<titles.length;i++){

const start = i/steps
const end = (i+1)/steps

let local = (p-start)/(end-start)
local = Math.min(Math.max(local,0),1)

const el = titles[i]

el.style.opacity = local>0 && local<1 ? 1 : 0
el.style.transform = `translate3d(0,${120-local*120}px,0) scale(${0.9+local*0.1})`
}

/* photos */
const photoStart = .45
const photoProgress = Math.max(0,(p-photoStart)*2)

p1.style.opacity = photoProgress
p1.style.transform = `translate3d(${ -400 + photoProgress*500}px,-50px,0) scale(${0.8+photoProgress*.2})`

p2.style.opacity = photoProgress
p2.style.transform = `translate3d(${ 400 - photoProgress*500}px,80px,0) scale(${0.8+photoProgress*.2})`

p3.style.opacity = photoProgress
p3.style.transform = `translate3d(${ -200 + photoProgress*300}px,220px,0)`

p4.style.opacity = photoProgress
p4.style.transform = `translate3d(${ 200 - photoProgress*300}px,-220px,0)`

/* gift reveal */
const giftStart = .8
const g = Math.max(0,(p-giftStart)*5)

gift.style.opacity = g
gift.style.transform = `scale(${0.6+g*.4}) rotate(${ -10 + g*10 }deg)`

giftText.style.opacity = g

/* blobs */
blobs.forEach((b,i)=>{
 b.style.opacity = .4
 b.style.transform = `translate3d(${Math.sin(p*6+i)*400}px,${Math.cos(p*5+i)*300}px,0)`
})

requestAnimationFrame(animate)
}

animate()
</script>

</body>
</html>
