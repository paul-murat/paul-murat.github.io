<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scroll Animation Apple Style</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body{
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color:#111;
      overflow-x:hidden;
    }

    header{
      position:fixed;
      top:0;
      width:100%;
      background:white;
      text-align:center;
      padding:30px;
      font-size:42px;
      font-weight:600;
      z-index:100;
      box-shadow:0 5px 20px rgba(0,0,0,0.05);
    }

    .spacer{
      height:120vh;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:28px;
      color:#666;
    }

    .scroll-section{
      height:300vh; /* grande zone pour animation liée au scroll */
      position:relative;
      background:black;
      color:white;
    }

    .sticky{
      position:sticky;
      top:0;
      height:100vh;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .title{
      position:absolute;
      font-size:64px;
      font-weight:600;
      opacity:0;
      transform:translateY(100px);
    }

    .box{
      position:absolute;
      width:120px;
      height:120px;
      border-radius:24px;
      background:linear-gradient(135deg,#0ea5e9,#6366f1);
      opacity:0;
      transform:scale(.3) rotate(0deg);
    }

    .box1{ left:20%; top:50%; }
    .box2{ left:50%; top:30%; }
    .box3{ left:75%; top:60%; }

    footer{
      height:60vh;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:40px;
      background:#111;
      color:white;
    }

  </style>
</head>
<body>

<header>Bonjour</header>

<div class="spacer">Scroll ↓</div>
<div class="spacer">Encore ↓</div>

<section class="scroll-section" id="scrollSection">
  <div class="sticky">

    <div class="title" id="title">Animations au scroll</div>

    <div class="box box1" id="box1"></div>
    <div class="box box2" id="box2"></div>
    <div class="box box3" id="box3"></div>

  </div>
</section>

<footer>Au revoir</footer>

<script>
const section = document.getElementById('scrollSection');
const title = document.getElementById('title');
const box1 = document.getElementById('box1');
const box2 = document.getElementById('box2');
const box3 = document.getElementById('box3');

window.addEventListener('scroll', () => {
  const rect = section.getBoundingClientRect();
  const windowHeight = window.innerHeight;

  let progress = 0;

  if(rect.top <= 0 && rect.bottom >= windowHeight){
    progress = Math.abs(rect.top) / (rect.height - windowHeight);
  }

  progress = Math.min(Math.max(progress, 0), 1);

  /* TITLE */
  title.style.opacity = progress * 2;
  title.style.transform = `translateY(${100 - progress*100}px)`;

  /* BOX 1 */
  box1.style.opacity = progress * 1.2;
  box1.style.transform = `
    scale(${0.3 + progress})
    rotate(${progress*360}deg)
    translateY(${progress * -100}px)
  `;

  /* BOX 2 */
  const p2 = Math.max(0, progress - 0.2);
  box2.style.opacity = p2 * 1.5;
  box2.style.transform = `
    scale(${0.3 + p2})
    rotate(${p2*360}deg)
    translateY(${p2 * 120}px)
  `;

  /* BOX 3 */
  const p3 = Math.max(0, progress - 0.4);
  box3.style.opacity = p3 * 1.5;
  box3.style.transform = `
    scale(${0.3 + p3})
    rotate(${p3*360}deg)
    translateY(${p3 * -150}px)
  `;

});
</script>

</body>
</html>
